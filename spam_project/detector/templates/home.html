<!DOCTYPE html>
<html>
<head>
    <title>Titanic Predictor</title>
</head>
<body>

<h1>Titanic Survival Predictor 🚢</h1>

<form method="POST">
    {% csrf_token %}

    <label>Passenger Class:</label>
    <input type="number" name="pclass" required><br><br>

    <label>Gender (0 = Male, 1 = Female):</label>
    <input type="number" name="sex" required><br><br>

    <label>Age:</label>
    <input type="number" name="age" step="0.1" required><br><br>

    <label>Fare:</label>
    <input type="number" name="fare" step="0.1" required><br><br>

    <button type="submit">Predict</button>
</form>

{% if result %}
    <h2>{{ result }}</h2>
{% endif %}

</body>
</html>
